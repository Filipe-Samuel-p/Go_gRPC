syntax = "proto3";

package department;

option go_package = "./src/pb/departament";

message ListPersonRequest{
    int32 departamentID = 1;
}

message ListPersonResponse{
    int32 id = 1;
    string name = 2;
    string email = 3;
    int32 income = 4;
    int32 departamentID = 5;
}

service DepartamentService {
    rpc ListPerson(ListPersonRequest) returns (stream ListPersonResponse);
}